name: Synka

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gmail-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install -r scripts/requirements.txt

      - name: Synka Gmail
        run: python scripts/sync_gmail.py
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

      - name: Skrapa Tradera-profil
        run: python scripts/scrape_tradera.py

      - name: Committa uppdaterad data
        run: |
          git config user.name "sprylar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/store.json
          if git diff --cached --quiet; then
            echo "Inga ändringar att committa."
          else
            git commit -m "Synk $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
